site_name: imbalanced-losses
site_url: https://chris-santiago.github.io/imbalanced-losses/
site_description: PyTorch losses for class-imbalanced classification — Focal Loss, Smooth-AP, Recall-at-Quantile, with DDP all-gather support.
site_author: Chris Santiago
repo_url: https://github.com/chris-santiago/imbalanced-losses
repo_name: chris-santiago/imbalanced-losses

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.follow
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_bases: true
            show_root_heading: true
            heading_level: 2
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Tutorials:
    - tutorials/index.md
    - Getting Started: tutorials/getting-started.md
  - How-To Guides:
    - how-to/index.md
    - Use Focal Loss: how-to/use-focal-loss.md
    - Use Ranking Losses: how-to/use-ranking-losses.md
    - Configure Warmup and Blending: how-to/configure-warmup.md
    - Train with DDP: how-to/train-with-ddp.md
    - Log Per-Class Metrics: how-to/log-per-class-metrics.md
  - Reference:
    - reference/index.md
    - SigmoidFocalLoss: reference/sigmoid-focal-loss.md
    - SoftmaxFocalLoss: reference/softmax-focal-loss.md
    - SmoothAPLoss: reference/smooth-ap-loss.md
    - RecallAtQuantileLoss: reference/recall-at-quantile-loss.md
    - LossWarmupWrapper: reference/loss-warmup-wrapper.md
    - Distributed Utilities: reference/distributed.md
  - Explanation:
    - explanation/index.md
    - Why Imbalanced Losses: explanation/why-imbalanced-losses.md
    - Memory Queue Design: explanation/memory-queue.md
    - Temperature and Soft Ranking: explanation/temperature-soft-ranking.md
    - DDP All-Gather and Gradients: explanation/ddp-all-gather.md
    - Assumptions and Failure Modes: explanation/assumptions-and-failure-modes.md
